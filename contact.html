<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="icon" type="image/png "href="images/icon-contact.png">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="navnav">
            <div id="clockdatecontainer">
                <div id="clock">00:00</div>
                <div id="dayDisplay"></div>
            </div>
            <h1>Contact Me</h1>
            <img src="images/icon-sun.png" class="darkmodebutton" id="darkbtn" onclick="toggledarkmode()">
        </div>
        <div id="fakeborderleft"></div>
        <div id="fakeborderright"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="feedback.html">Feedback</a>
        </nav>
    </header>

    <section id="contact">
        <article>
            <p><b><i>Contact me using the form below:</i></b></p>
            <form onsubmit="return areyousure()">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required>
                <br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
                <br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" required></textarea>
                <br><br>

                <input type="submit" value="Send">
            </form>
        </article>
    </section>

    <footer>
        <p>&copy; 2005-2026 Abram. All rights reserved.</p> 
    </footer>

    <script src="jscript.js"></script>
</body>

</html>
